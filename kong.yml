_format_version: "3.0"
_transform: true

# =========================================================================
# 1. DEFINISI UPSTREAM (UNTUK CIRCUIT BREAKER & TIMEOUT MILIDETIK)
# =========================================================================
upstreams:
  - name: order-upstream
    slots: 1000
    healthchecks:
      passive:
        type: http
        unhealthy:
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 2
          http_failures: 3
        healthy:
          http_statuses: [200, 201]
          successes: 2

  - name: auth-upstream
    slots: 1000
    healthchecks:
      passive:
        type: http
        unhealthy:
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 2
          http_failures: 3
        healthy:
          http_statuses: [200, 201]
          successes: 2

  - name: payment-upstream
    slots: 1000
    healthchecks:
      passive:
        type: http
        unhealthy:
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 2
          http_failures: 3
        healthy:
          http_statuses: [200, 201]
          successes: 2

# =========================================================================
# 2. TARGET MAPPING (LOAD BALANCING KE REPLIKA KONTANER DOCKER)
# =========================================================================
targets:
  # Pecah target order menjadi dua kontainer terpisah di bawah upstream yang sama
  - target: order-service-1:3000
    upstream: order-upstream
  - target: order-service-2:3000
    upstream: order-upstream
    
  - target: auth-service:3000
    upstream: auth-upstream
    weight: 50

  - target: payment-service:3000
    upstream: payment-upstream
    weight: 50

# =========================================================================
# 3. MANAGEMENT SERVICES, ROUTES, & PLUGINS
# =========================================================================
services:
  # -------------------------------------------------------------------------
  # ORDER SERVICE (Rate Limiting + Circuit Breaker + JWT AUTH AKTIF)
  # -------------------------------------------------------------------------
  - name: order-service
    host: order-upstream
    port: 80
    retries: 0
    connect_timeout: 1000
    read_timeout: 1000
    write_timeout: 1000
    routes:
      - name: order-route
        paths:
          - /orders
        strip_path: false     # Pastikan false agar python membaca path /orders utuh
    plugins:
      - name: rate-limiting
        tags: [pembatas-order]
        config:
          minute: 5
          policy: local
      - name: jwt
        tags: [jwt-order]
        config:
          claims_to_verify:
            - exp

  # -------------------------------------------------------------------------
  # AUTH SERVICE (Rate Limiting + Circuit Breaker)
  # -------------------------------------------------------------------------
  - name: auth-service
    host: auth-upstream
    port: 80
    retries: 0
    connect_timeout: 1000
    read_timeout: 1000
    write_timeout: 1000
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: false  
    plugins:
      - name: rate-limiting
        tags: [pembatas-auth]
        config:
          minute: 5
          policy: local

  # -------------------------------------------------------------------------
  # PAYMENT SERVICE (Rate Limiting + Circuit Breaker)
  # -------------------------------------------------------------------------
  - name: payment-service
    host: payment-upstream
    port: 80
    retries: 0
    connect_timeout: 1000
    read_timeout: 1000
    write_timeout: 1000
    routes:
      - name: payment-route
        paths:
          - /payments
        strip_path: false  
    plugins:
      - name: rate-limiting
        tags: [pembatas-payment]
        config:
          minute: 5
          policy: local
      - name: jwt
        tags: [jwt-payment]
        config:
          claims_to_verify:
            - exp

# =========================================================================
# 4. DATA KONSUMEN & KREDENSIAL JWT (PENCENTANG VALIDASI KONG)
# =========================================================================
consumers:
  - username: user-aplikasi-kita

jwt_secrets:
  - consumer: user-aplikasi-kita
    key: "iss-kampus-kita"
    secret: "kunciRahasiaSuperAman123"