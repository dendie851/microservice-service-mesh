services:
  # =========================================================================
  # KONG API GATEWAY (Pintu Depan dengan 4 Fitur Unggulan)
  # =========================================================================
  kong:
    image: kong:3.4
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"                           # Mode DB-less (membaca langsung dari kong.yml)
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_ADMIN_LISTEN: 0.0.0.0:8001                # Port Admin API (untuk simulasi JWT via curl)
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002            # Port Dashboard Kong Manager
    volumes:
      - ./kong.yml:/usr/local/kong/kong.yml:ro       # Sinkronisasi file konfigurasi
    ports:
      - "8000:8000" # Jalur akses API Utama (Buka di browser/Postman)
      - "8001:8001" # Admin API Kong
      - "8002:8002" # Dashboard Kong Manager
    networks:
      - app-network

  # =========================================================================
  # MICROSERVICES (Aplikasi Python Anda - Port Asli 3000)
  # =========================================================================
  auth-service:
    build:
      context: ./service
    container_name: auth-service
    command: ["Auth Service", "3000"]
    networks:
      - app-network

  order-service:
    build:
      context: ./service
    container_name: order-service
    command: ["Order Service", "3000"]
    networks:
      - app-network

  payment-service:
    build:
      context: ./service
    container_name: payment-service
    command: ["Payment Service", "3000"]
    networks:
      - app-network

networks:
  app-network:
    driver: bridge