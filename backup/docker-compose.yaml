services:
  # =========================================================================
  # 1. KONG API GATEWAY
  # =========================================================================
  kong:
    image: kong:3.4
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
      KONG_ADMIN_GUI_URL: http://localhost:8002
      KONG_ADMIN_GUI_API_URL: http://localhost:8001
    volumes:
      - ./kong.yml:/usr/local/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    networks:
      - app-network

  # =========================================================================
  # 2. CONSUL SERVER (Control Plane)
  # =========================================================================
  consul:
    image: hashicorp/consul:1.15
    container_name: consul-server
    command: "agent -server -bootstrap-expect=1 -ui -bind=0.0.0.0 -client=0.0.0.0 -config-dir=/consul/config"
    volumes:
      - ./consul-config/config.hcl:/consul/config/config.hcl
    ports:
      - "8500:8500"
    networks:
      - app-network

  # =========================================================================
  # 3. MICROSERVICES + INTEGRATED MESH PROXY
  # =========================================================================

  # --- AUTH SERVICE ---
  auth-service:
    build: context: ./service
    container_name: auth-service
    command: ["Auth Verified", "3000"]
    networks:
      - app-network

  auth-mesh:
    image: hashicorp/consul:1.15
    container_name: auth-mesh
    command: "agent -dev -client=0.0.0.0 -config-file=/consul/config/auth.json -retry-join=consul"
    volumes:
      - ./consul-config/auth.json:/consul/config/auth.json
    depends_on:
      - consul
    network_mode: "service:auth-service"

  # --- ORDER SERVICE ---
  order-service:
    build: context: ./service
    container_name: order-service
    command: ["Order Service Active", "3000"]
    networks:
      - app-network

  order-mesh:
    image: hashicorp/consul:1.15
    container_name: order-mesh
    command: "agent -dev -client=0.0.0.0 -config-file=/consul/config/order.json -retry-join=consul"
    volumes:
      - ./consul-config/order.json:/consul/config/order.json
    depends_on:
      - consul
    network_mode: "service:order-service"

  # --- PAYMENT SERVICE ---
  payment-service:
    build: context: ./service
    container_name: payment-service
    command: ["Payment Processed", "3000"]
    networks:
      - app-network

  payment-mesh:
    image: hashicorp/consul:1.15
    container_name: payment-mesh
    command: "agent -dev -client=0.0.0.0 -config-file=/consul/config/payment.json -retry-join=consul"
    volumes:
      - ./consul-config/payment.json:/consul/config/payment.json
    depends_on:
      - consul
    network_mode: "service:payment-service"

networks:
  app-network:
    driver: bridge