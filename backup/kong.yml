_format_version: "3.0"

services:
  - name: order-service
    url: http://order-service:3000
    routes:
      - name: order-route
        paths:
          - /orders

  - name: auth-service
    url: http://auth-service:3000
    routes:
      - name: auth-route
        paths:
          - /auth

  - name: payment-service
    url: http://payment-service:3000
    routes:
      - name: payment-route
        paths:
          - /payments